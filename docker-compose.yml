
services:
  database:
    image: postgres:15-alpine
    container_name: cyberfusion_postgres
    restart: always
    environment:
      POSTGRES_USER: cyberfusion
      POSTGRES_PASSWORD: cyberfusion_pass
      POSTGRES_DB: cyberfusion_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberfusion -d cyberfusion_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cyberfusion_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyberfusion_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_USER=cyberfusion
      - POSTGRES_PASSWORD=cyberfusion_pass
      - POSTGRES_DB=cyberfusion_db
      - POSTGRES_HOST=database
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cyberfusion_frontend
    restart: always
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
